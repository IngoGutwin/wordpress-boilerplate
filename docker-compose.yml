services:
  
  service_am_mysql_db:
    image: mysql:lts
    container_name: container_am_mysql_db
    restart: unless-stopped 
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: "test123"
      MYSQL_DATABASE: "wp_am"
      MYSQL_USER: "wp_am_user"
      MYSQL_PASSWORD: "test123"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
